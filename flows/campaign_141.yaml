appId: ${APP_ID}
tags:
  - campaign-141
name: E2E — Campaign 141 full loop with real push delivery
---
# SHARED cross-platform flow for Customer.io Campaign 141 ("Maestro E2E").
#
# Runs unchanged on iOS (APN-UIKit) and Android (kotlin_compose) because
# both sample apps expose the same accessibility identifiers:
#   - iOS: `accessibilityIdentifier` on each UIView.
#   - Android: `Modifier.testTag(...)` on each composable, surfaced as
#     `resource-id` via `Modifier.semantics { testTagsAsResourceId = true }`
#     on the root nav graph.
#
# Selector conventions:
#   - `{ id: "..." }`  for every widget we want to drive/assert (stable).
#   - text / regex     only for shared surface copy (modal body, push title,
#                      system permission prompts) where IDs aren't applicable.
#
# Per-sample overrides (email prefix, harness path, hardware-back vs edge-swipe)
# live in each sample repo's `.maestro/run.sh` and `scripts/setup_run.js`.
# This file is the single source of truth for the test itself.
#
#   SDK identify+track
#     → backend routes
#       → campaign 141 fires 3 actions
#         → in-app modal dispatched (metrics.sent)
#         → in-app inline dispatched (metrics.sent)
#         → push sent, delivered to the device (metrics.delivered)
#           → user taps it
#             → SDK reports click → backend records metrics.opened

- runScript:
    file: ../scripts/setup_run.js

- launchApp:
    clearState: true

# --- Login ---
- assertVisible:
    id: "Login Button|login_button"
- tapOn:
    id: "First Name Input|display_name_text_input"
- inputText: "Maestro Campaign Tester"
- hideKeyboard
- tapOn:
    id: "Email Input|email_text_input"
- inputText: ${output.email}
- hideKeyboard
- tapOn:
    id: "Login Button|login_button"

# --- Welcome modal from identify (campaign 55) ---
# Best-effort: if the SDK's MessagingInApp isn't initialized (siteId missing),
# the modal never appears and we just proceed to the dashboard.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - assertVisible: ".*Thank you for choosing.*"
      - takeScreenshot: artifacts/c141_01_welcome_modal
      - tapOn: "Continue"

- assertVisible:
    id: "Custom Event Button|send_custom_event_button"
- takeScreenshot: artifacts/c141_02_dashboard

# --- Grant push permission if the system prompt appears ---
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# If another in-app modal was queued (multiple campaigns around identify),
# dismiss it before firing the campaign-141 trigger event.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 2000

# --- Fire the `maestro_test` event to trigger Campaign 141 ---
- tapOn:
    id: "Custom Event Button|send_custom_event_button"
- extendedWaitUntil:
    visible:
      id: "Event Name Input|event_name_text_input"
    timeout: 10000
- tapOn:
    id: "Event Name Input|event_name_text_input"
- inputText: "maestro_test"
- hideKeyboard
- tapOn:
    id: "Property Name Input|property_name_text_input"
- inputText: "run_id"
- hideKeyboard
- tapOn:
    id: "Property Value Input|property_value_text_input"
- inputText: ${output.run_id}
- hideKeyboard
- takeScreenshot: artifacts/c141_03_event_form
# The SDK may flush a queued in-app modal between the form fill and the send
# tap (campaigns that dispatch multiple in-apps around identify). Dismiss it
# so the Send Event tap lands on the actual button and not on a modal backdrop.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 2000
# The event form is scrollable on Android (Java sample); scroll to reveal the
# Send Event button if it's below the fold before tapping. Use visible text
# "Send Event" because Android's ConstraintLayout with bottom-anchored button
# in a NestedScrollView can prevent the id from appearing in Maestro's
# bounds-filtered hierarchy until scrolled into view.
- scrollUntilVisible:
    element:
      text: "^Send Event$"
    direction: DOWN
    timeout: 15000
- tapOn: "^Send Event$"

# --- Backend assertion #1: in-app action dispatched ---
- runScript:
    file: ../scripts/assert_message_delivered.js
    env:
      MAESTRO_EXT_API_KEY: ${MAESTRO_EXT_API_KEY}
      RUN_EMAIL: ${output.email}
      EXPECTED_TYPE: "in_app"
      MIN_METRIC: "sent"
      CAMPAIGN_ID: "141"
      MAX_WAIT_MS: "45000"
- assertTrue: ${output.assert_ok === "true"}

# --- Return to dashboard. If the event screen auto-popped after Send we're
# already on the dashboard; otherwise navigate back. The SDK may ALSO be
# rendering a modal from Campaign 141's in-app action at this point, so
# dismiss any Continue that appears before waiting for the dashboard. ---
- runFlow:
    when:
      notVisible:
        id: "Custom Event Button|send_custom_event_button"
    commands:
      - back
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 2000
- extendedWaitUntil:
    visible:
      id: "Custom Event Button|send_custom_event_button"
    timeout: 10000

# --- Inline in-app visual proof (best-effort) ---
# Campaign 141 also dispatches an inline action. Navigate to an Inline
# Examples screen so the inline renders in its slot; capture screenshots.
# Screen label differs per sample — regex matches "Inline Examples (Tabs)",
# "Inline Examples (SwiftUI)", and "Inline Examples (UIKit)".
- runFlow:
    when:
      visible: ".*Inline Examples.*"
    commands:
      - tapOn: ".*Inline Examples.*"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: artifacts/c141_07_inline_a
      - scroll
      - takeScreenshot: artifacts/c141_08_inline_b
      - scroll
      - takeScreenshot: artifacts/c141_09_inline_c
      - runFlow:
          when:
            notVisible:
              id: "Custom Event Button|send_custom_event_button"
          commands:
            - back
            - swipe:
                start: 1%, 50%
                end: 80%, 50%

# --- Visual proof: pull down the notification shade / Notification Center ---
# The push going live IS the shade showing the notification, so we don't need
# a separate backend assertion for push dispatch — the visual proof below
# is the assertion. If the notification doesn't appear, the shade section's
# `runFlow: when: visible: Maestro Push` short-circuits and we skip the
# click + `opened` checks (iOS case when APNs isn't wired).
- waitForAnimationToEnd:
    timeout: 3000
- swipe:
    start: 50%, 1%
    end: 50%, 90%
    duration: 900
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Maestro Push"
    commands:
      - assertVisible: "Maestro Push"
      - assertVisible: "MAESTRO_PUSH_OK"
      - takeScreenshot: artifacts/c141_04_push_in_shade
      - tapOn: "Maestro Push"
      - waitForAnimationToEnd:
          timeout: 4000
      # Returning to a known in-app screen is the proof that the push tap
      # deep-linked / opened the app, without relying on backend metrics
      # (which can lag a few seconds behind the actual click).
      - extendedWaitUntil:
          visible:
            id: "Custom Event Button|send_custom_event_button"
          timeout: 10000
      - takeScreenshot: artifacts/c141_05_after_push_tap

- takeScreenshot: artifacts/c141_06_done
