appId: ${APP_ID}
tags:
  - campaign-141
name: E2E — Campaign 141 full loop with real push delivery
---
# SHARED cross-platform flow for Customer.io Campaign 141 ("Maestro E2E").
#
# Runs unchanged on iOS (APN-UIKit) and Android (java_layout) because both
# sample apps use the same id naming on every widget the flow touches.
# Per Maestro docs:
#   - iOS:     `id:` maps to `accessibilityIdentifier`
#   - Android: `id:` maps to `android:id` (resource-id). For Compose,
#              `Modifier.semantics { testTagsAsResourceId = true }` surfaces
#              `testTag(...)` values as resource-id.
# The selector contract below is therefore `snake_case`, applied on both
# platforms. Platform-specific bits (hardware back vs edge swipe,
# notification center vs notification shade) are handled via
# `when: platform:` conditions — per Maestro's official pattern.
#
#   SDK identify+track
#     → backend routes
#       → campaign 141 fires 3 actions
#         → in-app modal dispatched (metrics.sent)
#         → in-app inline dispatched (metrics.sent)
#         → push sent, delivered to the device (metrics.delivered)
#           → user taps it
#             → SDK reports click → backend records metrics.opened

- runScript:
    file: ../scripts/setup_run.js

- launchApp:
    clearState: true

# --- Login ---
- assertVisible:
    id: "login_button"
- tapOn:
    id: "first_name_input"
- inputText: "Maestro Campaign Tester"
- hideKeyboard
- tapOn:
    id: "email_input"
- inputText: ${output.email}
- hideKeyboard
- tapOn:
    id: "login_button"

# --- Welcome modal from identify (campaign 55) ---
# Best-effort: if MessagingInApp isn't initialized (siteId missing) the modal
# never appears; we just proceed to the dashboard. Backend dispatches the
# in_app either way — we assert that via the Ext API further down.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - assertVisible: ".*Thank you for choosing.*"
      - takeScreenshot: artifacts/c141_01_welcome_modal
      - tapOn: "Continue"

- assertVisible:
    id: "custom_event_button"
- takeScreenshot: artifacts/c141_02_dashboard

# --- Grant push permission if the system prompt appears ---
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"

# If another in-app modal was queued (multiple campaigns around identify),
# dismiss it before firing the campaign-141 trigger event.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 2000

# --- Fire the `maestro_test` event to trigger Campaign 141 ---
- tapOn:
    id: "custom_event_button"
- extendedWaitUntil:
    visible:
      id: "event_name_input"
    timeout: 10000
- tapOn:
    id: "event_name_input"
- inputText: "maestro_test"
- hideKeyboard
- tapOn:
    id: "property_name_input"
- inputText: "run_id"
- hideKeyboard
- tapOn:
    id: "property_value_input"
- inputText: ${output.run_id}
- hideKeyboard
- takeScreenshot: artifacts/c141_03_event_form
# The SDK may flush a queued in-app modal between form fill and the Send tap.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 2000
# Android NestedScrollView can keep the Send button below the fold.
- scrollUntilVisible:
    element:
      id: "send_event_button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "send_event_button"

# --- Backend assertion #1: in-app action dispatched ---
- runScript:
    file: ../scripts/assert_message_delivered.js
    env:
      MAESTRO_EXT_API_KEY: ${MAESTRO_EXT_API_KEY}
      RUN_EMAIL: ${output.email}
      EXPECTED_TYPE: "in_app"
      MIN_METRIC: "sent"
      CAMPAIGN_ID: "141"
      MAX_WAIT_MS: "45000"
- assertTrue: ${output.assert_ok === "true"}

# --- Dismiss any modal Campaign 141 raised, then return to dashboard ---
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd:
          timeout: 2000
# Both samples expose a "Back Button" in the top app bar (Android uses
# contentDescription, iOS uses accessibilityIdentifier). Tap it to pop back
# to the dashboard — this is more reliable than Android's hardware back
# (which the IME can consume) and iOS has no hardware back at all.
- runFlow:
    when:
      notVisible:
        id: "custom_event_button"
    commands:
      - tapOn: "Back Button"
- extendedWaitUntil:
    visible:
      id: "custom_event_button"
    timeout: 10000

# --- Inline in-app visual proof (best-effort) ---
# Screen label differs per sample — regex matches "Inline Examples (Tabs)",
# "Inline Examples (SwiftUI)", and "Inline Examples (UIKit)".
- runFlow:
    when:
      visible: ".*Inline Examples.*"
    commands:
      - tapOn: ".*Inline Examples.*"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: artifacts/c141_07_inline_a
      - scroll
      - takeScreenshot: artifacts/c141_08_inline_b
      - scroll
      - takeScreenshot: artifacts/c141_09_inline_c
      - runFlow:
          when:
            notVisible:
              id: "custom_event_button"
          commands:
            - tapOn: "Back Button"

# --- Visual proof: notification shade / Notification Center ---
# The push going live IS the shade showing the notification — if the
# notification doesn't appear the shade's `runFlow: when: visible: Maestro Push`
# short-circuits and we skip the click check (iOS case when APNs isn't wired).
- waitForAnimationToEnd:
    timeout: 3000
- swipe:
    start: 50%, 1%
    end: 50%, 90%
    duration: 900
- waitForAnimationToEnd:
    timeout: 2000
- runFlow:
    when:
      visible: "Maestro Push"
    commands:
      - assertVisible: "Maestro Push"
      - assertVisible: "MAESTRO_PUSH_OK"
      - takeScreenshot: artifacts/c141_04_push_in_shade
      - tapOn: "Maestro Push"
      - waitForAnimationToEnd:
          timeout: 4000
      # App-returned-to-known-screen is the proof the push tap opened the app.
      - extendedWaitUntil:
          visible:
            id: "custom_event_button"
          timeout: 10000
      - takeScreenshot: artifacts/c141_05_after_push_tap

- takeScreenshot: artifacts/c141_06_done
