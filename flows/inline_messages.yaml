appId: ${APP_ID}
tags:
  - inline
name: Inline in-app — render + position template
---
# Template flow for inline in-app validation. Logs in, fires a
# `maestro_show_inline` trigger event, and hands off to a workspace-seeded
# inline campaign to render into a slot. Assertions are soft (screenshot
# only) until the workspace has a deterministic campaign:
#
#   - event trigger: "maestro_show_inline"
#   - action: inline in-app targeting one of the sample's slot ids
#     (sticky-header / inline / below-fold on iOS; tab variants on Android)
#   - body text: contains a deterministic marker (e.g. "MAESTRO_INLINE_OK")
#
# Then uncomment the assertVisible lines below.

- runScript:
    file: ../scripts/setup_run.js

- launchApp:
    clearState: true

# --- Login ---
- assertVisible:
    id: "login_button"
- tapOn:
    id: "first_name_input"
- inputText: "Maestro Inline Tester"
- hideKeyboard
- tapOn:
    id: "email_input"
- inputText: ${output.email}
- hideKeyboard
- tapOn:
    id: "login_button"

# Dismiss the identify-time welcome in-app if it appears.
- runFlow:
    when:
      visible: "Continue"
    commands:
      - tapOn: "Continue"

# --- Fire the inline trigger event ---
- assertVisible:
    id: "custom_event_button"
- tapOn:
    id: "custom_event_button"
- extendedWaitUntil:
    visible:
      id: "event_name_input"
    timeout: 10000
- tapOn:
    id: "event_name_input"
- inputText: "maestro_show_inline"
- hideKeyboard
- tapOn:
    id: "property_name_input"
- inputText: "run_id"
- hideKeyboard
- tapOn:
    id: "property_value_input"
- inputText: ${output.run_id}
- hideKeyboard
- scrollUntilVisible:
    element:
      text: "^Send Event$"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "send_event_button"

# --- Backend assertion: the trigger event dispatched an in_app ---
- runScript:
    file: ../scripts/assert_message_delivered.js
    env:
      MAESTRO_EXT_API_KEY: ${MAESTRO_EXT_API_KEY}
      RUN_EMAIL: ${output.email}
      EXPECTED_TYPE: "in_app"
      MIN_METRIC: "sent"
      MAX_WAIT_MS: "30000"
# Soft-assert: tolerate failure until the workspace has the inline-specific
# campaign seeded. Flip to `assertTrue` once it is.
# - assertTrue: ${output.assert_ok === "true"}
